<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width,initial-scale=1.0">
    <meta name="title" content="marek onPC">
    <meta name="description" content="Personal blog with variety of stuff like programming, bread & cakes baking and world wide trips!">

    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://marek-onpc.com/">
    <meta property="og:title" content="marek onPC">
    <meta property="og:description" content="Personal blog with variety of stuff like programming, bread & cakes baking and world wide trips!">
    <meta property="og:image" content="<%= BASE_URL %>meta_img.jpg">

    <!-- Twitter -->
    <meta property="twitter:card" content="summary_large_image">
    <meta property="twitter:url" content="https://marek-onpc.com/">
    <meta property="twitter:title" content="marek-onPC">
    <meta property="twitter:description" content="Personal blog with variety of stuff like programming, bread & cakes baking and world wide trips!">
    <meta property="twitter:image" content="<%= BASE_URL %>meta_img.jpg">

    <link rel="icon" href="<%= BASE_URL %>favicon.svg">
    <title><%= htmlWebpackPlugin.options.title %></title>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css?family=Roboto:100,300,400,500,700,900">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@mdi/font@latest/css/materialdesignicons.min.css">
  </head>
  <body>
    <noscript>
      <strong>We're sorry but <%= htmlWebpackPlugin.options.title %> doesn't work properly without JavaScript enabled. Please enable it to continue.</strong>
    </noscript>
    <div id="app"></div>
    <!-- built files will be auto injected -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/animejs/3.2.1/anime.js"></script>
  </body>
</html>
